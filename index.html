<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n4tuss | Neon Interactive Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#05070a] text-slate-300 font-['Space_Grotesk'] overflow-x-hidden selection:bg-emerald-500/30 selection:text-emerald-400">

    <!-- Persistent Green Matrix Layer -->
    <canvas id="matrix-canvas" class="fixed inset-0 z-0 pointer-events-none"></canvas>

    <main class="relative z-10 max-w-7xl mx-auto py-16 px-4 md:px-8 space-y-16 pb-32">
        
        <!-- Interactive Hero Banner -->
        <section class="flex flex-col items-center text-center space-y-6 pt-10 pb-8 reveal">
            <h1 id="hero-greeting" class="text-4xl md:text-6xl font-bold text-white tracking-tight min-h-[80px]">
                <!-- Typing effect masuk ke sini -->
            </h1>
            <p id="hero-status" class="text-emerald-400 font-['Fira_Code'] text-sm md:text-base tracking-widest uppercase glitch-hover">
                <!-- Diisi JS -->
            </p>
        </section>

        <!-- Solid 3D Tilt Cards -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Project Main -->
            <div id="project-main" class="solid-neon-card tilt-element md:col-span-2 p-8 md:p-10 flex flex-col justify-between h-[340px] reveal">
                <!-- Diisi JS -->
            </div>

            <!-- Profile Info -->
            <div id="about-mini" class="solid-neon-card tilt-element md:col-span-1 p-8 flex flex-col justify-between reveal">
                <!-- Diisi JS -->
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Skills -->
            <div id="skills-container" class="solid-neon-card tilt-element md:col-span-2 p-8 reveal">
                <h3 class="text-white font-bold text-xl mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-bolt text-emerald-400"></i> Power Levels
                </h3>
                <div id="skills-list" class="space-y-5">
                    <!-- Diisi JS -->
                </div>
            </div>

            <!-- Archived Project -->
            <div id="project-archived" class="solid-neon-card tilt-element md:col-span-1 p-8 flex flex-col justify-between reveal">
                <!-- Diisi JS -->
            </div>
        </section>

        <!-- Redesigned Asymmetric UI (Solid & Modern) -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-12 pt-8">
            
            <!-- Achievements -->
            <div class="space-y-6 reveal">
                <h3 class="text-white font-bold text-2xl flex items-center gap-3 mb-8">
                    <i class="fa-solid fa-ranking-star text-emerald-400"></i> Milestones
                </h3>
                <div id="achievements-container" class="space-y-6">
                    <!-- Diisi JS -->
                </div>
            </div>

            <!-- Targets & Tools -->
            <div class="space-y-12">
                <div class="space-y-6 reveal">
                    <h3 class="text-white font-bold text-xl flex items-center gap-3">
                        <i class="fa-solid fa-crosshairs text-emerald-400"></i> Active Target
                    </h3>
                    <div id="targets-container" class="flex flex-col space-y-4">
                        <!-- Diisi JS -->
                    </div>
                </div>

                <div class="space-y-6 reveal">
                    <h3 class="text-white font-bold text-xl flex items-center gap-3">
                        <i class="fa-solid fa-terminal text-emerald-400"></i> Dev Tools
                    </h3>
                    <div id="tools-container" class="flex flex-wrap gap-3">
                        <!-- Diisi JS -->
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- Solid Dock Footer -->
    <footer class="fixed bottom-8 w-full flex justify-center z-50 pointer-events-none px-4">
        <div id="socials-links" class="flex items-center gap-2 bg-[#0a0d14] px-6 py-4 rounded-2xl border-2 border-slate-800 shadow-[0_0_30px_rgba(0,0,0,0.8)] pointer-events-auto">
            <!-- Diisi JS -->
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
